spring.application.name=business-service

# Ancienne base : localhost:5432/business_service avec postgres/123456.
# Elle pointait vers le port de catalog-db au lieu de business-db.
# spring.datasource.url=jdbc:postgresql://localhost:5432/business_service
# spring.datasource.username=postgres
# spring.datasource.password=123456
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/business_db}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Ancien port : 8080. Il est reserve a l'API Gateway.
# server.port=8080
server.port=${SERVER_PORT:8084}

# Services consultes pour ne plus faire confiance aux donnees envoyees par React.
identity.service.base-url=${IDENTITY_SERVICE_URL:http://localhost:8081}
catalog.service.base-url=${CATALOG_SERVICE_URL:http://localhost:8083}
internal.service-token=${INTERNAL_SERVICE_TOKEN:change-this-internal-token}
support.service.base-url=${SUPPORT_SERVICE_URL:http://localhost:8086}
payment.service.base-url=${PAYMENT_SERVICE_URL:http://localhost:8085}

# Ancienne fonction Supabase : delai fixe de 24 h. La regle est maintenant
# centralisee et configurable dans Business Service.
orders.auto-validation-delay=${ORDER_AUTO_VALIDATION_DELAY:PT24H}
orders.auto-validation-scan-ms=${ORDER_AUTO_VALIDATION_SCAN_MS:60000}
orders.auto-validation-initial-delay-ms=${ORDER_AUTO_VALIDATION_INITIAL_DELAY_MS:15000}
