spring:
  datasource:
    url: 'jdbc:h2:mem:catalog_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=CREATE DOMAIN IF NOT EXISTS JSONB AS JSON'
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false

identity:
  service:
    base-url: http://localhost:18081

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173

logging:
  level:
    root: info
    org.hibernate.SQL: info
    org.springframework.boot.autoconfigure: info
