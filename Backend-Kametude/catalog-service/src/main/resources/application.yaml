spring:
  application:
    name: kametud_catalog

  datasource:
    # Ancienne configuration : utilisateur postgres avec un mot de passe local.
    # Les valeurs par defaut correspondent maintenant a catalog-db dans Docker.
    # url: jdbc:postgresql://localhost:5432/catalog_db
    # username: postgres
    # password: 809145
    # Repli utilise seulement en lancement Maven/IDE nu : catalog-db est expose
    # sur 5632 par docker-compose.yml. start-local.ps1 et Compose passent DB_URL.
    url: ${DB_URL:jdbc:postgresql://localhost:5632/catalog_db}
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  # port: 8083
  port: ${SERVER_PORT:8083}

identity:
  service:
    # base-url: http://localhost:8081
    base-url: ${IDENTITY_SERVICE_URL:http://localhost:8081}
    student-status-path: /api/students/{studentId}/status
    student-profile-path: /api/profiles/{studentId}

internal:
  service-token: ${INTERNAL_SERVICE_TOKEN:change-this-internal-token}

# Le CORS est gere une seule fois, au niveau de l'api-gateway (globalcors,
# origine ${PUBLIC_SITE_URL}). Le catalogue ne declare donc pas sa propre
# politique : l'ancienne, restreinte a localhost, rejetait en 403
# « Invalid CORS request » toute requete mutante (POST/PUT/PATCH/DELETE) venant
# du navigateur en production, car elle porte un en-tete Origin que le service
# voyait comme cross-origin. Les autres services metier delegent deja au
# gateway de la meme facon.
