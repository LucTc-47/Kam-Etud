# Ancien port : 8085. Il entrait en conflit avec payment-service.
# server.port=8085
server.port=${SERVER_PORT:8082}
spring.application.name=requestservice

# Ancienne base : localhost:5432/kametud_requests avec postgres/123456.
# request-db est expose sur 5633 par docker-compose.yml et ecoute sur 5432
# a l'interieur du reseau Docker. DB_URL est fourni par start-local.ps1 et
# par Compose ; la valeur ci-dessous ne sert qu'a un lancement Maven nu.
# spring.datasource.url=jdbc:postgresql://localhost:5432/kametud_requests
# spring.datasource.username=postgres
# spring.datasource.password=123456
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5633/request_db}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.cm.kametud=DEBUG

# Identity Service utilise pour les noms publics et la verification KYC.
identity.service.base-url=${IDENTITY_SERVICE_URL:http://localhost:8081}
business.service.base-url=${BUSINESS_SERVICE_URL:http://localhost:8084}
internal.service-token=${INTERNAL_SERVICE_TOKEN:change-this-internal-token}
support.service.base-url=${SUPPORT_SERVICE_URL:http://localhost:8086}
