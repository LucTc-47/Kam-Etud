spring:
  application:
    name: support-service
  datasource:
    # url: jdbc:postgresql://localhost:5436/support_db
    url: ${DB_URL:jdbc:postgresql://localhost:5436/support_db}
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:10MB}

server:
  # port: 8086
  port: ${SERVER_PORT:8086}

eureka:
  client:
    enabled: false

app:
  storage:
    location: ${STORAGE_LOCATION:storage}

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

services:
  business-url: ${BUSINESS_SERVICE_URL:http://localhost:8084}
  identity-url: ${IDENTITY_SERVICE_URL:http://localhost:8081}
  internal-token: ${INTERNAL_SERVICE_TOKEN:change-this-internal-token}
