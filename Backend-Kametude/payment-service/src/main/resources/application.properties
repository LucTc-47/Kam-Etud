spring.application.name=payment-service
# server.port=8085
server.port=${SERVER_PORT:8085}

# spring.datasource.url=jdbc:postgresql://localhost:5435/payment_db
# spring.datasource.username=user
# spring.datasource.password=password
# Repli utilise seulement en lancement Maven/IDE nu : payment-db est expose
# sur 5635 par docker-compose.yml. start-local.ps1 et Compose passent DB_URL.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5635/payment_db}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

payment.provider=${PAYMENT_PROVIDER:${PAYMENT_MODE:mesomb}}

mesomb.base-url=${MESOMB_BASE_URL:https://business.mesomb.com/fr/api/v1.1}
# Les anciennes cles live stockees ici ont ete retirees pour raison de securite.
# Elles doivent etre revoquees puis fournies uniquement via l'environnement.
mesomb.application-key=${MESOMB_APPLICATION_KEY}
mesomb.access-key=${MESOMB_ACCESS_KEY}
mesomb.secret-key=${MESOMB_SECRET_KEY}
mesomb.request-timeout-seconds=${MESOMB_REQUEST_TIMEOUT_SECONDS:30}
mesomb.max-network-retries=${MESOMB_MAX_NETWORK_RETRIES:0}

business.service.base-url=${BUSINESS_SERVICE_URL:http://localhost:8084}
identity.service.base-url=${IDENTITY_SERVICE_URL:http://localhost:8081}
internal.service-token=${INTERNAL_SERVICE_TOKEN:change-this-internal-token}
support.service.base-url=${SUPPORT_SERVICE_URL:http://localhost:8086}
