# Deploiement de production sur VPS.
#
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d
#
# Contraintes de la machine cible, qui expliquent la plupart des choix
# de ce fichier (voir DEPLOY.md pour le detail) :
#   - 3,7 Go de RAM sans swap, partages avec une autre application ;
#   - 2 vCPU ;
#   - les ports 80, 443 et 3000-3999 appartiennent a l'autre application ;
#   - l'utilisateur de deploiement n'a pas les droits root.
#
# La machine heberge deja la production de rctt.academy et une experimentation
# reseau Mininet, non conteneurisee et sans plafond memoire. Toute la
# configuration vise a ne jamais leur nuire.
#
# Consequences :
#   - un seul Postgres heberge les six bases (voir postgres/init-databases.sh) ;
#   - chaque conteneur porte un mem_limit : un service qui derive est tue lui,
#     avant d'epuiser la RAM systeme et de faire tomber les voisins ;
#   - les JVM sont bridees au minimum viable, sinon Java reserve 25 % de la RAM
#     de l'hote par service, soit environ 925 Mo x 7 ;
#   - RabbitMQ a ete retire : aucun pom.xml ne declare de dependance AMQP et
#     toute la communication inter-services passe par Spring REST Client ;
#   - l'exposition passe par le Traefik deja present, via des labels poses sur
#     NOS conteneurs. Ni sa configuration ni ses conteneurs ne sont modifies.

# Nom de projet fige. Sans lui, Compose deduirait « backend-kametude » du nom du
# dossier : les volumes changeraient de nom si le depot etait clone ailleurs,
# et la base de production deviendrait invisible.
name: kametud

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - default
  logging:
    driver: json-file
    options:
      # Sans plafond, les logs saturent le disque partage avec l'autre application.
      max-size: "10m"
      max-file: "3"

x-java-defaults: &java-defaults
  # Reglage taille au plus juste pour cohabiter avec les applications voisines.
  #
  # MaxRAMPercentage=50 : la JVM se cale sur le mem_limit du conteneur, pas sur
  #   les 3,7 Go de l'hote. Sans lui, chaque service reserverait ~925 Mo.
  # UseSerialGC : le ramasse-miettes le plus econome sur petits tas et 2 vCPU.
  # TieredStopAtLevel=1 : compilation C1 uniquement, ce qui divise le cache de
  #   code. On perd en performance de pointe, invisible a 30 utilisateurs.
  # Xss256k : 200 threads a 1 Mo de pile par defaut, c'est 200 Mo pour rien.
  JAVA_TOOL_OPTIONS: >-
    -XX:MaxRAMPercentage=50.0
    -XX:+UseSerialGC
    -XX:TieredStopAtLevel=1
    -XX:MaxMetaspaceSize=96m
    -Xss256k

  # Les beans sont instancies a la premiere utilisation au lieu du demarrage.
  # Contrepartie : le premier appel a chaque ecran est plus lent de 200-400 ms.
  SPRING_MAIN_LAZY_INITIALIZATION: "true"

  # Spring reserve 200 threads Tomcat par defaut. A 30 utilisateurs, 20 suffisent.
  SERVER_TOMCAT_THREADS_MAX: "20"
  SERVER_TOMCAT_THREADS_MIN_SPARE: "2"

  # Le gain le plus souvent oublie : chaque connexion coute 5 a 10 Mo cote
  # PostgreSQL. Par defaut Hikari en ouvre 10 par service, soit 60 au total.
  # A 5, on divise par deux la memoire consommee par le serveur de bases.
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "5"
  SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "1"

  # application.yaml active show-sql en developpement. En production le SQL
  # complet noierait les logs et remplirait le disque partage.
  SPRING_JPA_SHOW_SQL: "false"

services:
  postgres:
    <<: *service-defaults
    image: postgres:16-alpine
    # Reglages tailles pour une instance unique hebergeant six petites bases
    # sur une machine partagee. Les valeurs par defaut de l'image visent un
    # serveur dedie et reserveraient plusieurs centaines de Mo inutiles.
    # max_connections=40 couvre les 6 services x 5 connexions Hikari, le seed
    # et une session psql d'administration.
    command: >-
      postgres
      -c shared_buffers=48MB
      -c max_connections=40
      -c work_mem=2MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=192MB
    environment:
      # Role d'administration. Il cree les six bases au premier demarrage
      # puis ne sert plus : chaque service se connecte avec son propre role.
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:?Set POSTGRES_ADMIN_USER in .env.prod}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:?Set POSTGRES_ADMIN_PASSWORD in .env.prod}
      POSTGRES_DB: postgres
      IDENTITY_DB_USERNAME: ${IDENTITY_DB_USERNAME:?Set IDENTITY_DB_USERNAME in .env.prod}
      IDENTITY_DB_PASSWORD: ${IDENTITY_DB_PASSWORD:?Set IDENTITY_DB_PASSWORD in .env.prod}
      CATALOG_DB_USERNAME: ${CATALOG_DB_USERNAME:?Set CATALOG_DB_USERNAME in .env.prod}
      CATALOG_DB_PASSWORD: ${CATALOG_DB_PASSWORD:?Set CATALOG_DB_PASSWORD in .env.prod}
      REQUEST_DB_USERNAME: ${REQUEST_DB_USERNAME:?Set REQUEST_DB_USERNAME in .env.prod}
      REQUEST_DB_PASSWORD: ${REQUEST_DB_PASSWORD:?Set REQUEST_DB_PASSWORD in .env.prod}
      BUSINESS_DB_USERNAME: ${BUSINESS_DB_USERNAME:?Set BUSINESS_DB_USERNAME in .env.prod}
      BUSINESS_DB_PASSWORD: ${BUSINESS_DB_PASSWORD:?Set BUSINESS_DB_PASSWORD in .env.prod}
      PAYMENT_DB_USERNAME: ${PAYMENT_DB_USERNAME:?Set PAYMENT_DB_USERNAME in .env.prod}
      PAYMENT_DB_PASSWORD: ${PAYMENT_DB_PASSWORD:?Set PAYMENT_DB_PASSWORD in .env.prod}
      SUPPORT_DB_USERNAME: ${SUPPORT_DB_USERNAME:?Set SUPPORT_DB_USERNAME in .env.prod}
      SUPPORT_DB_PASSWORD: ${SUPPORT_DB_PASSWORD:?Set SUPPORT_DB_PASSWORD in .env.prod}
    volumes:
      # Ancien fichier : aucun volume n'etait declare pour les bases.
      # Un « docker compose down » suffisait a effacer toute la production.
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-databases.sh:/docker-entrypoint-initdb.d/10-init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    mem_limit: 224m
    # Aucun port publie : seuls les conteneurs du reseau interne y accedent.

  identity-service:
    <<: *service-defaults
    image: ghcr.io/luctc-47/kametud-identity-service:${IMAGE_TAG:-latest}
    build:
      context: ./identity-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *java-defaults
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://postgres:5432/identity_db
      DB_USERNAME: ${IDENTITY_DB_USERNAME:?Set IDENTITY_DB_USERNAME in .env.prod}
      DB_PASSWORD: ${IDENTITY_DB_PASSWORD:?Set IDENTITY_DB_PASSWORD in .env.prod}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.prod}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?Set INTERNAL_SERVICE_TOKEN in .env.prod}
      CATALOG_SERVICE_URL: http://catalog-service:8083
    mem_limit: 256m

  catalog-service:
    <<: *service-defaults
    image: ghcr.io/luctc-47/kametud-catalog-service:${IMAGE_TAG:-latest}
    build:
      context: ./catalog-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *java-defaults
      SERVER_PORT: 8083
      DB_URL: jdbc:postgresql://postgres:5432/catalog_db
      DB_USERNAME: ${CATALOG_DB_USERNAME:?Set CATALOG_DB_USERNAME in .env.prod}
      DB_PASSWORD: ${CATALOG_DB_PASSWORD:?Set CATALOG_DB_PASSWORD in .env.prod}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.prod}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?Set INTERNAL_SERVICE_TOKEN in .env.prod}
      IDENTITY_SERVICE_URL: http://identity-service:8081
    # Mesure en production : 228 Mo, soit 89 % d'un plafond a 256 Mo. Trop pres
    # pour absorber un pic de ramasse-miettes sans se faire tuer.
    mem_limit: 320m

  request-service:
    <<: *service-defaults
    image: ghcr.io/luctc-47/kametud-request-service:${IMAGE_TAG:-latest}
    build:
      context: ./requestservice
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *java-defaults
      SERVER_PORT: 8082
      DB_URL: jdbc:postgresql://postgres:5432/request_db
      DB_USERNAME: ${REQUEST_DB_USERNAME:?Set REQUEST_DB_USERNAME in .env.prod}
      DB_PASSWORD: ${REQUEST_DB_PASSWORD:?Set REQUEST_DB_PASSWORD in .env.prod}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.prod}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?Set INTERNAL_SERVICE_TOKEN in .env.prod}
      IDENTITY_SERVICE_URL: http://identity-service:8081
      BUSINESS_SERVICE_URL: http://business-service:8084
      SUPPORT_SERVICE_URL: http://support-service:8086
    mem_limit: 256m

  business-service:
    <<: *service-defaults
    image: ghcr.io/luctc-47/kametud-business-service:${IMAGE_TAG:-latest}
    build:
      context: ./business-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *java-defaults
      SERVER_PORT: 8084
      DB_URL: jdbc:postgresql://postgres:5432/business_db
      DB_USERNAME: ${BUSINESS_DB_USERNAME:?Set BUSINESS_DB_USERNAME in .env.prod}
      DB_PASSWORD: ${BUSINESS_DB_PASSWORD:?Set BUSINESS_DB_PASSWORD in .env.prod}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.prod}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?Set INTERNAL_SERVICE_TOKEN in .env.prod}
      IDENTITY_SERVICE_URL: http://identity-service:8081
      CATALOG_SERVICE_URL: http://catalog-service:8083
      PAYMENT_SERVICE_URL: http://payment-service:8085
      SUPPORT_SERVICE_URL: http://support-service:8086
    # Mesure en production : 210 Mo, soit 82 % d'un plafond a 256 Mo.
    mem_limit: 320m

  payment-service:
    <<: *service-defaults
    image: ghcr.io/luctc-47/kametud-payment-service:${IMAGE_TAG:-latest}
    build:
      context: ./payment-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *java-defaults
      SERVER_PORT: 8085
      DB_URL: jdbc:postgresql://postgres:5432/payment_db
      DB_USERNAME: ${PAYMENT_DB_USERNAME:?Set PAYMENT_DB_USERNAME in .env.prod}
      DB_PASSWORD: ${PAYMENT_DB_PASSWORD:?Set PAYMENT_DB_PASSWORD in .env.prod}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.prod}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?Set INTERNAL_SERVICE_TOKEN in .env.prod}
      PAYMENT_MODE: ${PAYMENT_MODE:-mock}
      BUSINESS_SERVICE_URL: http://business-service:8084
      IDENTITY_SERVICE_URL: http://identity-service:8081
      SUPPORT_SERVICE_URL: http://support-service:8086
    mem_limit: 256m

  support-service:
    <<: *service-defaults
    image: ghcr.io/luctc-47/kametud-support-service:${IMAGE_TAG:-latest}
    build:
      context: ./support-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *java-defaults
      SERVER_PORT: 8086
      DB_URL: jdbc:postgresql://postgres:5432/support_db
      DB_USERNAME: ${SUPPORT_DB_USERNAME:?Set SUPPORT_DB_USERNAME in .env.prod}
      DB_PASSWORD: ${SUPPORT_DB_PASSWORD:?Set SUPPORT_DB_PASSWORD in .env.prod}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.prod}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?Set INTERNAL_SERVICE_TOKEN in .env.prod}
      BUSINESS_SERVICE_URL: http://business-service:8084
      IDENTITY_SERVICE_URL: http://identity-service:8081
      STORAGE_LOCATION: ${STORAGE_LOCATION:-/app/storage}
    volumes:
      - support_storage:/app/storage
    mem_limit: 256m

  api-gateway:
    <<: *service-defaults
    image: ghcr.io/luctc-47/kametud-api-gateway:${IMAGE_TAG:-latest}
    build:
      context: ./api-gateway
    depends_on:
      - identity-service
      - request-service
      - catalog-service
      - business-service
      - payment-service
      - support-service
    environment:
      <<: *java-defaults
      GATEWAY_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.prod}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?Set INTERNAL_SERVICE_TOKEN in .env.prod}
      IDENTITY_SERVICE_URL: http://identity-service:8081
      REQUEST_SERVICE_URL: http://request-service:8082
      CATALOG_SERVICE_URL: http://catalog-service:8083
      BUSINESS_SERVICE_URL: http://business-service:8084
      PAYMENT_SERVICE_URL: http://payment-service:8085
      SUPPORT_SERVICE_URL: http://support-service:8086
      SUPPORT_SERVICE_WS_URL: ws://support-service:8086
      # Origines CORS autorisees par la Gateway. Meme si le frontend et l'API
      # partagent la meme origine en fonctionnement normal, le navigateur joint
      # un en-tete Origin aux requetes POST : la Gateway la refuse d'un 403 si
      # elle n'est pas listee ici.
      FRONTEND_URL: ${PUBLIC_SITE_URL:?Set PUBLIC_SITE_URL in .env.prod}
      FRONTEND_ALT_URL: ${PUBLIC_SITE_ALT_URL:-${PUBLIC_SITE_URL}}
      # Le 3e emplacement doublait PUBLIC_SITE_URL, donc ne servait a rien.
      # Reaffecte au diagnostic : le motif http://*:8090 couvre a la fois le
      # tunnel SSH (http://localhost:8090) et l'exposition temporaire par IP
      # (http://51.255.164.235:8090). Restreint au seul port 8090, il n'ouvre
      # pas le CORS a des origines arbitraires.
      FRONTEND_LAN_PATTERN: ${DIAG_ORIGIN:-http://*:8090}
    healthcheck:
      # api-gateway est le seul service a embarquer spring-boot-starter-actuator.
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    ports:
      # Publie uniquement sur la boucle locale, pour diagnostiquer en SSH
      # (curl http://127.0.0.1:8080/actuator/health). Inaccessible depuis
      # l'exterieur : ce n'est pas un contournement du reverse proxy.
      - "127.0.0.1:8080:8080"
    mem_limit: 192m

  frontend:
    <<: *service-defaults
    image: ghcr.io/luctc-47/kametud-frontend:${IMAGE_TAG:-latest}
    build:
      # Le build React vit a la racine du depot, un niveau au-dessus.
      context: ..
      dockerfile: Dockerfile
    depends_on:
      - api-gateway
    # Seul conteneur de la stack a rejoindre le reseau de Traefik. Les huit
    # autres restent sur le reseau prive « kametud », donc invisibles depuis
    # les conteneurs voisins.
    networks:
      - default
      - traefik
    ports:
      # Par defaut, publie sur la boucle locale uniquement (diagnostic SSH).
      # Le trafic public normal ne passe pas par la : Traefik joint le
      # conteneur par le reseau Docker.
      # Exposition temporaire par IP : mettre PUBLIC_BIND=0.0.0.0 dans .env.prod.
      # Resecuriser = retirer cette variable et recreer le conteneur.
      - "${PUBLIC_BIND:-127.0.0.1}:${PUBLIC_HTTP_PORT:-8090}:8080"
    labels:
      # Le Traefik deja installe sur la machine decouvre ces labels tout seul.
      # Sa configuration reste intacte : on ne touche ni a son traefik.yml,
      # ni a ses conteneurs, ni a ses routes existantes.
      #
      # Son provider Docker est en « exposedByDefault: false » : sans le label
      # ci-dessous, un conteneur est purement ignore. Nos huit autres services
      # sont donc invisibles pour lui par construction.
      #
      # Interrupteur d'exposition. Tant que l'enregistrement DNS ne pointe pas
      # vers cette machine, le laisser a « false » : Traefik ignore alors
      # totalement le conteneur, donc ne demande aucun certificat. Sinon le defi
      # HTTP-01 de Let's Encrypt echouerait en boucle, remplirait le journal du
      # Traefik voisin et consommerait le quota d'echecs de validation.
      # La stack reste testable par tunnel SSH pendant ce temps.
      # Passer a « true » puis relancer : docker compose up -d frontend
      traefik.enable: "${TRAEFIK_ENABLE:-false}"

      # Obligatoire des qu'un conteneur a plusieurs reseaux, sinon Traefik peut
      # retenir l'adresse du mauvais et router vers le vide.
      traefik.docker.network: ${TRAEFIK_NETWORK:-rctt_default}

      # Nom de routeur distinct de ceux deja en place (rctt, rctt-staging,
      # rctt-dev, dashboard). Un nom identique aurait ecrase leur route :
      # c'est le seul vrai risque de cette manipulation, et il est ecarte.
      traefik.http.routers.kametud.rule: Host(`${PUBLIC_SITE_HOST:?Set PUBLIC_SITE_HOST in .env.prod}`) || Host(`www.${PUBLIC_SITE_HOST}`)
      traefik.http.routers.kametud.entrypoints: websecure
      traefik.http.routers.kametud.tls.certresolver: letsencrypt
      traefik.http.services.kametud.loadbalancer.server.port: "8080"
    healthcheck:
      # 127.0.0.1 et non « localhost » : dans ce conteneur, localhost ne resout
      # que vers ::1 alors que nginx ecoute en IPv4 (listen 8080). La sonde
      # echouait sur « Connection refused » pendant que le service repondait
      # parfaitement, marquant le conteneur unhealthy a tort.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 32m

  # Ancien service « cloudflared » retire.
  # Il repondait a l'hypothese d'un VPS sans reverse proxy exploitable. La
  # machine cible expose un Traefik v3 avec resolveur Let's Encrypt deja
  # configure : quelques labels suffisent, ce qui evite 96 Mo de RAM, la
  # migration DNS vers Cloudflare et le passage du trafic chez un tiers.

  seed:
    <<: *service-defaults
    image: postgres:16-alpine
    # Conteneur ephemere : il cree les comptes admin et moderator, puis sort.
    # « exited (0) » dans « docker compose ps » est le resultat attendu.
    #
    # Ces deux roles ne peuvent pas etre crees par le formulaire d'inscription :
    # AuthService.register rejette ADMIN et MODERATOR pour qu'un visiteur ne
    # puisse pas se declarer administrateur.
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      # Attend que la Gateway reponde : le script s'inscrit par l'API publique
      # pour que le profil soit cree et lie au compte, ce qu'un INSERT SQL
      # direct ne ferait pas.
      api-gateway:
        condition: service_healthy
    environment:
      API_URL: http://api-gateway:8080
      PGHOST: postgres
      PGDATABASE: identity_db
      PGUSER: ${IDENTITY_DB_USERNAME:?Set IDENTITY_DB_USERNAME in .env.prod}
      PGPASSWORD: ${IDENTITY_DB_PASSWORD:?Set IDENTITY_DB_PASSWORD in .env.prod}
      SEED_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin1234!}
    volumes:
      - ./scripts/seed-admin.sh:/seed/seed-admin.sh:ro
    entrypoint: ["bash", "/seed/seed-admin.sh"]
    mem_limit: 64m

networks:
  # Reseau prive de la stack. Huit conteneurs sur neuf n'en sortent jamais.
  default:
    name: kametud_prod

  # Reseau du Traefik deja present sur la machine. « external: true » signifie
  # que Compose s'y raccorde sans jamais le creer ni le supprimer : un
  # « docker compose down » de notre cote ne peut pas le detruire, donc ne peut
  # pas couper les applications voisines qui l'utilisent.
  traefik:
    name: ${TRAEFIK_NETWORK:-rctt_default}
    external: true

volumes:
  postgres_data:
  support_storage:
