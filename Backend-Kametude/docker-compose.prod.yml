# Production VPS compose file.
# Load secrets with:
# docker compose --env-file .env.prod -f docker-compose.prod.yml up -d

services:
  identity-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: ${IDENTITY_DB_USERNAME:?Set IDENTITY_DB_USERNAME in .env.prod}
      POSTGRES_PASSWORD: ${IDENTITY_DB_PASSWORD:?Set IDENTITY_DB_PASSWORD in .env.prod}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${IDENTITY_DB_USERNAME:?Set IDENTITY_DB_USERNAME in .env.prod} -d identity_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - default

  catalog-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: ${CATALOG_DB_USERNAME:?Set CATALOG_DB_USERNAME in .env.prod}
      POSTGRES_PASSWORD: ${CATALOG_DB_PASSWORD:?Set CATALOG_DB_PASSWORD in .env.prod}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CATALOG_DB_USERNAME:?Set CATALOG_DB_USERNAME in .env.prod} -d catalog_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - default

  request-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: request_db
      POSTGRES_USER: ${REQUEST_DB_USERNAME:?Set REQUEST_DB_USERNAME in .env.prod}
      POSTGRES_PASSWORD: ${REQUEST_DB_PASSWORD:?Set REQUEST_DB_PASSWORD in .env.prod}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${REQUEST_DB_USERNAME:?Set REQUEST_DB_USERNAME in .env.prod} -d request_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - default

  business-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: business_db
      POSTGRES_USER: ${BUSINESS_DB_USERNAME:?Set BUSINESS_DB_USERNAME in .env.prod}
      POSTGRES_PASSWORD: ${BUSINESS_DB_PASSWORD:?Set BUSINESS_DB_PASSWORD in .env.prod}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BUSINESS_DB_USERNAME:?Set BUSINESS_DB_USERNAME in .env.prod} -d business_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - default

  payment-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: ${PAYMENT_DB_USERNAME:?Set PAYMENT_DB_USERNAME in .env.prod}
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASSWORD:?Set PAYMENT_DB_PASSWORD in .env.prod}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAYMENT_DB_USERNAME:?Set PAYMENT_DB_USERNAME in .env.prod} -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - default

  support-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: support_db
      POSTGRES_USER: ${SUPPORT_DB_USERNAME:?Set SUPPORT_DB_USERNAME in .env.prod}
      POSTGRES_PASSWORD: ${SUPPORT_DB_PASSWORD:?Set SUPPORT_DB_PASSWORD in .env.prod}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SUPPORT_DB_USERNAME:?Set SUPPORT_DB_USERNAME in .env.prod} -d support_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - default

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?Set RABBITMQ_DEFAULT_USER in .env.prod}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?Set RABBITMQ_DEFAULT_PASS in .env.prod}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - default

  identity-service:
    image: kametud-identity-service:latest
    build:
      context: ./identity-service
    depends_on:
      identity-db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://identity-db:5432/identity_db
      DB_USERNAME: ${IDENTITY_DB_USERNAME:?Set IDENTITY_DB_USERNAME in .env.prod}
      DB_PASSWORD: ${IDENTITY_DB_PASSWORD:?Set IDENTITY_DB_PASSWORD in .env.prod}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.prod}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?Set INTERNAL_SERVICE_TOKEN in .env.prod}
      CATALOG_SERVICE_URL: http://catalog-service:8083
    ports:
      - "8081:8081"
    networks:
      - default

  catalog-service:
    image: kametud-catalog-service:latest
    build:
      context: ./catalog-service
    depends_on:
      catalog-db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8083
      DB_URL: jdbc:postgresql://catalog-db:5432/catalog_db
      DB_USERNAME: ${CATALOG_DB_USERNAME:?Set CATALOG_DB_USERNAME in .env.prod}
      DB_PASSWORD: ${CATALOG_DB_PASSWORD:?Set CATALOG_DB_PASSWORD in .env.prod}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.prod}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?Set INTERNAL_SERVICE_TOKEN in .env.prod}
      IDENTITY_SERVICE_URL: http://identity-service:8081
    ports:
      - "8083:8083"
    networks:
      - default

  request-service:
    image: kametud-request-service:latest
    build:
      context: ./requestservice
    depends_on:
      request-db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8082
      DB_URL: jdbc:postgresql://request-db:5432/request_db
      DB_USERNAME: ${REQUEST_DB_USERNAME:?Set REQUEST_DB_USERNAME in .env.prod}
      DB_PASSWORD: ${REQUEST_DB_PASSWORD:?Set REQUEST_DB_PASSWORD in .env.prod}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.prod}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?Set INTERNAL_SERVICE_TOKEN in .env.prod}
      IDENTITY_SERVICE_URL: http://identity-service:8081
      BUSINESS_SERVICE_URL: http://business-service:8084
      SUPPORT_SERVICE_URL: http://support-service:8086
    ports:
      - "8082:8082"
    networks:
      - default

  business-service:
    image: kametud-business-service:latest
    build:
      context: ./business-service
    depends_on:
      business-db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8084
      DB_URL: jdbc:postgresql://business-db:5432/business_db
      DB_USERNAME: ${BUSINESS_DB_USERNAME:?Set BUSINESS_DB_USERNAME in .env.prod}
      DB_PASSWORD: ${BUSINESS_DB_PASSWORD:?Set BUSINESS_DB_PASSWORD in .env.prod}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.prod}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?Set INTERNAL_SERVICE_TOKEN in .env.prod}
      IDENTITY_SERVICE_URL: http://identity-service:8081
      CATALOG_SERVICE_URL: http://catalog-service:8083
      PAYMENT_SERVICE_URL: http://payment-service:8085
      SUPPORT_SERVICE_URL: http://support-service:8086
    ports:
      - "8084:8084"
    networks:
      - default

  payment-service:
    image: kametud-payment-service:latest
    build:
      context: ./payment-service
    depends_on:
      payment-db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8085
      DB_URL: jdbc:postgresql://payment-db:5432/payment_db
      DB_USERNAME: ${PAYMENT_DB_USERNAME:?Set PAYMENT_DB_USERNAME in .env.prod}
      DB_PASSWORD: ${PAYMENT_DB_PASSWORD:?Set PAYMENT_DB_PASSWORD in .env.prod}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.prod}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?Set INTERNAL_SERVICE_TOKEN in .env.prod}
      PAYMENT_MODE: ${PAYMENT_MODE:-mock}
      BUSINESS_SERVICE_URL: http://business-service:8084
      IDENTITY_SERVICE_URL: http://identity-service:8081
      SUPPORT_SERVICE_URL: http://support-service:8086
    ports:
      - "8085:8085"
    networks:
      - default

  support-service:
    image: kametud-support-service:latest
    build:
      context: ./support-service
    depends_on:
      support-db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8086
      DB_URL: jdbc:postgresql://support-db:5432/support_db
      DB_USERNAME: ${SUPPORT_DB_USERNAME:?Set SUPPORT_DB_USERNAME in .env.prod}
      DB_PASSWORD: ${SUPPORT_DB_PASSWORD:?Set SUPPORT_DB_PASSWORD in .env.prod}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.prod}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?Set INTERNAL_SERVICE_TOKEN in .env.prod}
      BUSINESS_SERVICE_URL: http://business-service:8084
      IDENTITY_SERVICE_URL: http://identity-service:8081
      STORAGE_LOCATION: ${STORAGE_LOCATION:-/app/storage}
    ports:
      - "8086:8086"
    volumes:
      - support_storage:/app/storage
    networks:
      - default

  api-gateway:
    image: kametud-api-gateway:latest
    build:
      context: ./api-gateway
    depends_on:
      identity-service:
        condition: service_started
      request-service:
        condition: service_started
      catalog-service:
        condition: service_started
      business-service:
        condition: service_started
      payment-service:
        condition: service_started
      support-service:
        condition: service_started
    environment:
      GATEWAY_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.prod}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?Set INTERNAL_SERVICE_TOKEN in .env.prod}
      IDENTITY_SERVICE_URL: http://identity-service:8081
      REQUEST_SERVICE_URL: http://request-service:8082
      CATALOG_SERVICE_URL: http://catalog-service:8083
      BUSINESS_SERVICE_URL: http://business-service:8084
      PAYMENT_SERVICE_URL: http://payment-service:8085
      SUPPORT_SERVICE_URL: http://support-service:8086
      SUPPORT_SERVICE_WS_URL: ws://support-service:8086
      FRONTEND_URL: https://kametud.com
      FRONTEND_ALT_URL: https://www.kametud.com
      FRONTEND_LAN_PATTERN: https://kametud.com
    ports:
      - "8080:8080"
    networks:
      - default

networks:
  default:
    name: backend-kametude_default

volumes:
  support_storage:
