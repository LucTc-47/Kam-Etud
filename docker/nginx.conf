# Porte d'entree unique de la stack Kam'Etud.
#
#   [proxy du VPS :443] -> 127.0.0.1:8090 -> ce serveur
#                                              /       -> build React statique
#                                              /api/*  -> api-gateway:8080
#                                              /ws/*   -> api-gateway:8080
#
# Le TLS n'est pas gere ici : les ports 80 et 443 appartiennent a l'autre
# application hebergee sur le VPS. C'est son reverse proxy qui termine le HTTPS
# puis relaie en clair vers ce port local.

# La politique de cache est calculee ici plutot que dans chaque location.
#
# nginx n'herite les `add_header` d'un niveau que si le niveau inferieur n'en
# declare aucun : un seul `add_header Cache-Control` place dans un location
# ferait disparaitre tous les en-tetes de securite du serveur. Passer par une
# variable permet de n'ecrire qu'un seul `add_header` global, donc de ne jamais
# declencher cette regle.
map $uri $kametud_cache_control {
    # Tout ce qui n'est pas empreinte doit etre revalide a chaque chargement.
    default                 "no-cache";

    # Vite empreinte les noms de fichiers (index-a1b2c3d4.js) : le contenu d'une
    # URL donnee ne change jamais, elle peut donc etre gardee un an.
    ~^/assets/              "public, max-age=31536000, immutable";

    # Un ancien service worker continuerait a servir l'ancienne version du site
    # apres un deploiement.
    ~^/sw\.js$              "no-cache, no-store, must-revalidate";

    # index.html porte les references aux bundles empreintes. S'il est cache, le
    # navigateur reclame indefiniment les bundles de la version precedente.
    ~^/index\.html$         "no-cache, no-store, must-revalidate";

    # Les reponses de l'API ne doivent jamais etre stockees par un
    # intermediaire, sinon un profil peut fuiter d'un utilisateur a l'autre.
    ~^/api/                 "no-store";
}

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Resolveur DNS interne de Docker. Sans lui, nginx resout les noms des
    # conteneurs une seule fois au demarrage et refuse de demarrer si
    # api-gateway n'est pas encore la ; il resterait ensuite bloque sur une
    # vieille IP apres chaque redeploiement de la gateway.
    resolver 127.0.0.11 ipv6=off valid=10s;

    # Le trafic public arrive par cloudflared, un conteneur du reseau interne :
    # sans ces directives, tous les visiteurs apparaitraient dans les logs avec
    # l'IP du tunnel. Cloudflare place l'IP reelle dans CF-Connecting-IP, qui ne
    # contient qu'une seule valeur et n'est donc pas falsifiable par empilement,
    # contrairement a X-Forwarded-For.
    set_real_ip_from 127.0.0.1/32;
    set_real_ip_from 172.16.0.0/12;
    real_ip_header CF-Connecting-IP;

    # Les livrables et pieces jointes transitent par /api/storage.
    client_max_body_size 25m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json application/xml
        image/svg+xml font/woff font/woff2;

    server_tokens off;

    # Seul bloc d'en-tetes du fichier : aucun location n'en declare, donc tous
    # les heritent. Voir le commentaire du map ci-dessus.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Cache-Control          $kametud_cache_control always;

    # Sonde utilisee par le healthcheck Docker. Ne doit rien journaliser.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        set $api_upstream "api-gateway:8080";
        proxy_pass http://$api_upstream$request_uri;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host  $host;

        # api.ts abandonne une requete au bout de 30 s : on laisse la meme marge
        # au backend plutot que de couper avant lui.
        proxy_connect_timeout 10s;
        proxy_send_timeout    35s;
        proxy_read_timeout    35s;

        proxy_buffering off;
    }

    # STOMP/WebSocket du support-service. Le frontend actuel fait du polling
    # REST, mais la route backend existe deja et sera utilisee sans changement
    # d'infrastructure.
    location /ws/ {
        set $ws_upstream "api-gateway:8080";
        proxy_pass http://$ws_upstream$request_uri;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;

        # Une connexion WebSocket reste ouverte : sans ce delai elle serait
        # coupee toutes les 60 secondes.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /assets/ {
        access_log off;
        try_files $uri =404;
    }

    # React Router gere les URL cote client : /mes-commandes n'existe pas sur le
    # disque et doit renvoyer index.html plutot qu'un 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
