name: Publish images

# Construit les images Docker et les pousse sur GitHub Container Registry.
#
# Le VPS cible a 2 vCPU, 3,7 Go de RAM, et n'a ni Java ni Maven installes
# (l'utilisateur de deploiement n'est pas root et ne peut donc pas les
# installer). Compiler les sept services Maven sur la machine est hors de
# portee : la CI construit, le VPS ne fait plus que « docker compose pull ».

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag supplementaire a publier (facultatif)"
        required: false
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      # Une image qui echoue ne doit pas annuler la construction des autres :
      # on veut voir toutes les erreurs en une seule execution.
      fail-fast: false
      matrix:
        include:
          - image: kametud-api-gateway
            context: Backend-Kametude/api-gateway
          - image: kametud-identity-service
            context: Backend-Kametude/identity-service
          - image: kametud-catalog-service
            context: Backend-Kametude/catalog-service
          # Le dossier s'appelle « requestservice » alors que le service se
          # nomme « request-service » dans Compose.
          - image: kametud-request-service
            context: Backend-Kametude/requestservice
          - image: kametud-business-service
            context: Backend-Kametude/business-service
          - image: kametud-payment-service
            context: Backend-Kametude/payment-service
          - image: kametud-support-service
            context: Backend-Kametude/support-service
          # Le frontend se construit depuis la racine du depot.
          - image: kametud-frontend
            context: .
            dockerfile: Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # Fourni automatiquement par GitHub Actions : aucun secret a creer.
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # GHCR exige un chemin en minuscules ; github.repository_owner peut
          # contenir des majuscules (LucTc-47).
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile || 'Dockerfile' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Le VPS est en x86_64 : une seule architecture suffit et le build
          # reste deux fois plus rapide qu'en multi-arch.
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
