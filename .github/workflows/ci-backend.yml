name: CI Backend

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  backend:
    name: Build and test ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - identity-service
          - catalog-service
          - business-service
          - payment-service
          - requestservice
          - support-service

    defaults:
      run:
        shell: bash

    steps:
      # Recupere le code source du depot.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Installe Java 21, requis par les microservices Spring Boot.
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # Cache Maven pour accelerer les telechargements de dependances.
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ matrix.service }}-${{ hashFiles('Backend-Kametude/**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-${{ matrix.service }}-
            ${{ runner.os }}-maven-

      # Affiche le service en cours pour que l'erreur soit visible dans les logs GitHub Actions.
      - name: Show service being built
        run: echo "Building and testing Backend-Kametude/${{ matrix.service }}"

      # Compile le microservice et lance ses tests unitaires.
      # Si Lombok ou une classe Java ne compile pas, cette etape echoue.
      - name: Maven clean install
        run: mvn -B -ntp -f "Backend-Kametude/${{ matrix.service }}/pom.xml" clean install
